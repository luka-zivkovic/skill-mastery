name: ci

on:
  push:
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # No third-party deps: the toolkit is stdlib-only. doctor.py runs the
      # validators, the unit tests, and a deterministic mock run of the full loop.
      - name: doctor
        run: python3 scripts/doctor.py
